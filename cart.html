<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Корзина | Наконец-то вкусно</title>
    <meta
      name="description"
      content="Корзина заказа: домашние полуфабрикаты с доставкой. Проверьте состав и перейдите к оформлению."
    />
    <meta property="og:title" content="Наконец-то вкусно — домашние полуфабрикаты" />
    <meta property="og:description" content="Домашние полуфабрикаты с доставкой. Заказывайте онлайн." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://testweb-production-ce4a.up.railway.app" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽</text></svg>"
    />
    <script src="assets/js/theme-init.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="header-root"></div>
    <main>
      <div class="container">
        <h1 class="section-title">Корзина</h1>
        <section class="panel">
          <div id="cart-empty-state" class="cart-empty-state" aria-hidden="true">
            <div class="cart-empty-state__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1" />
                <circle cx="20" cy="21" r="1" />
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
              </svg>
            </div>
            <p class="cart-empty-state__title">Корзина пуста</p>
            <p class="muted">Добавьте товары из каталога — они появятся здесь.</p>
            <a class="btn primary" href="/catalog">Перейти в каталог</a>
          </div>
          <div id="cart-filled" class="cart-filled">
            <div id="cart-list" class="cart-list"></div>
            <div id="cart-summary"></div>
          </div>
        </section>

        <section class="panel" id="recent-order-section" hidden>
          <h3>Недавние заказы</h3>
          <div id="recent-order-body" class="cart-list" style="margin-top: 12px"></div>
          <div class="actions" style="margin-top: 16px">
            <button type="button" class="btn primary" id="btn-repeat-last-order">Повторить этот заказ</button>
          </div>
        </section>
      </div>
    </main>
    <div id="footer-root"></div>
    <script src="assets/js/products.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
      function getLastOrderDraft() {
        try {
          const raw = window.localStorage.getItem("lastOrderDraft");
          if (!raw) return null;
          const d = JSON.parse(raw);
          if (!d || !Array.isArray(d.items) || !d.items.length) return null;
          return d;
        } catch (_e) {
          return null;
        }
      }

      function formatRecentOrderDate(iso) {
        const date = new Date(iso);
        if (Number.isNaN(date.getTime())) return "—";
        return new Intl.DateTimeFormat("ru-RU", { dateStyle: "medium", timeStyle: "short" }).format(date);
      }

      function renderRecentOrderBlock() {
        const section = document.getElementById("recent-order-section");
        const body = document.getElementById("recent-order-body");
        const btn = document.getElementById("btn-repeat-last-order");
        if (!section || !body || !btn) return;

        const draft = getLastOrderDraft();
        if (!draft) {
          section.hidden = true;
          return;
        }

        section.hidden = false;
        const esc = typeof window.escapeHtml === "function" ? window.escapeHtml : function (s) { return String(s); };

        const itemLines = draft.items
          .map(function (it) {
            const name = esc(it.name || "Товар");
            const q = Number(it.quantity || 0);
            const lineTotal =
              it.lineTotal != null && it.lineTotal !== ""
                ? Number(it.lineTotal)
                : Number(it.price || 0) * q;
            return (
              "<li>" +
              name +
              " × " +
              q +
              " — <strong>" +
              window.CartStore.formatRub(lineTotal) +
              "</strong></li>"
            );
          })
          .join("");

        body.innerHTML =
          "<p class='muted'>" +
          "<strong>" +
          esc(String(draft.orderId || "—")) +
          "</strong> · " +
          formatRecentOrderDate(draft.date) +
          "</p>" +
          "<ul style='margin:8px 0 0;padding-left:1.25em'>" +
          itemLines +
          "</ul>" +
          "<p style='margin-top:12px'><strong>Итого: " +
          window.CartStore.formatRub(draft.total) +
          "</strong></p>";

        btn.onclick = function () {
          draft.items.forEach(function (it) {
            const id = it && it.id;
            const qty = Number(it.quantity || 0);
            if (!id || !Number.isFinite(qty) || qty < 1) return;
            window.CartStore.addToCart(String(id), qty);
          });
          renderCart();
        };
      }

      function renderCart() {
        const list = document.getElementById("cart-list");
        const summary = document.getElementById("cart-summary");
        const items = window.CartStore.getCartDetailedItems();

        const emptyState = document.getElementById("cart-empty-state");
        const filled = document.getElementById("cart-filled");
        const recentSection = document.getElementById("recent-order-section");

        if (!items.length) {
          list.innerHTML = "";
          summary.innerHTML = "";
          emptyState.classList.add("is-visible");
          emptyState.setAttribute("aria-hidden", "false");
          filled.classList.add("is-hidden");
          renderRecentOrderBlock();
          return;
        }

        if (recentSection) recentSection.hidden = true;

        emptyState.classList.remove("is-visible");
        emptyState.setAttribute("aria-hidden", "true");
        filled.classList.remove("is-hidden");

        list.innerHTML = items.map(
          (item) => `
          <article class="cart-item">
            <div>
              <strong>${item.name}</strong>
              <div class="muted">${window.CartStore.formatRub(item.price)} / ${item.unit}</div>
            </div>
            <div class="qty-controls">
              <button data-action="minus" data-id="${item.id}">-</button>
              <span>${item.quantity}</span>
              <button data-action="plus" data-id="${item.id}">+</button>
            </div>
            <div>
              <strong>${window.CartStore.formatRub(item.lineTotal)}</strong>
            </div>
          </article>
        `
        ).join("");

        const totals = window.CartStore.getCartTotals();
        summary.innerHTML = `
          <p><strong>Итого: ${window.CartStore.formatRub(totals.total)}</strong></p>
          <div class="actions">
            <a class="btn" href="/catalog">Продолжить покупки</a>
            <a class="btn primary" href="/checkout">Оформить заказ</a>
          </div>
        `;

        list.querySelectorAll("button[data-id]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const { id, action } = btn.dataset;
            const current = window.CartStore.getCartDetailedItems().find((i) => i.id === id)?.quantity || 1;
            const next = action === "plus" ? current + 1 : current - 1;
            window.CartStore.setCartQuantity(id, next);
            renderCart();
          });
        });
      }

      window.addEventListener("cart:changed", renderCart);
      document.addEventListener("DOMContentLoaded", function () {
        if (typeof ensureProductsLoaded === "function") {
          ensureProductsLoaded().then(renderCart);
        } else {
          renderCart();
        }
      });
    </script>
  </body>
  </html>
