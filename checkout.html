<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Оформление заказа | Наконец-то вкусно</title>
    <meta
      name="description"
      content="Оформите заказ домашних полуфабрикатов: контакты, адрес доставки и оплата онлайн."
    />
    <meta property="og:title" content="Наконец-то вкусно — домашние полуфабрикаты" />
    <meta property="og:description" content="Домашние полуфабрикаты с доставкой. Заказывайте онлайн." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://testweb-production-ce4a.up.railway.app" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽</text></svg>"
    />
    <script src="assets/js/theme-init.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="header-root"></div>
    <main>
      <div class="container">
        <h1 class="section-title">Оформление заказа</h1>
        <div class="grid">
          <section class="panel">
            <h3>Данные получателя</h3>
            <form id="checkout-form">
              <input name="name" placeholder="Имя" required />
              <input name="phone" placeholder="Телефон" required />
              <input name="address" placeholder="Адрес доставки" required />
              <select name="contactMethod">
                <option value="">Предпочтительный способ связи</option>
                <option value="phone">Телефон</option>
                <option value="whatsapp">WhatsApp</option>
                <option value="telegram">Telegram</option>
              </select>
              <textarea name="comment" rows="4" placeholder="Комментарий к заказу"></textarea>
              <input name="telegram" type="text" placeholder="Ваш Telegram @username (необязательно)" autocomplete="off" />
              <label><input type="checkbox" required /> Согласен(на) на обработку персональных данных</label>
              <button class="btn primary" type="submit">Перейти к оплате</button>
            </form>
            <p id="checkout-result" class="muted"></p>
          </section>
          <section class="panel">
            <h3>Ваш заказ</h3>
            <div id="checkout-items"></div>
          </section>
        </div>
      </div>
    </main>
    <div id="footer-root"></div>
    <script src="assets/js/products.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/checkout.js"></script>
  </body>
  </html>
