<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Каталог | Наконец-то вкусно</title>
    <meta
      name="description"
      content="Выбирайте домашние полуфабрикаты: котлеты, голубцы, блины, пельмени и многое другое."
    />
    <meta property="og:title" content="Наконец-то вкусно — домашние полуфабрикаты" />
    <meta property="og:description" content="Домашние полуфабрикаты с доставкой. Заказывайте онлайн." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://testweb-production-ce4a.up.railway.app" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽</text></svg>"
    />
    <script src="assets/js/theme-init.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="header-root"></div>
    <main>
      <div class="container">
        <h1 class="section-title">Каталог товаров</h1>
        <div id="catalog-toolbar" class="cart-list" style="gap: 16px; margin-bottom: 20px; display: none">
          <input
            type="search"
            id="catalog-search"
            placeholder="Поиск по названию..."
            autocomplete="off"
            aria-label="Поиск по названию и описанию"
            style="max-width: 420px; width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); font: inherit; background: var(--surface); color: var(--text)"
          />
          <div id="catalog-category-buttons" class="actions category-filters" style="margin-top: 0"></div>
        </div>
        <div id="product-grid" class="grid"></div>
        <div id="catalog-no-results" class="panel" hidden>
          <p class="muted" id="catalog-no-results-text"></p>
          <div class="actions" style="margin-top: 12px">
            <button type="button" class="btn primary" id="catalog-reset-filters">Сбросить фильтр</button>
          </div>
        </div>
      </div>
    </main>
    <div id="footer-root"></div>
    <script src="assets/js/products.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
      var catalogActiveCategory = "all";

      function escapeAttr(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
      }

      function normalizeCategory(p) {
        return String((p && p.category) || "").trim();
      }

      function productMatchesSearch(p, query) {
        if (!query) return true;
        var hay = (String(p.name || "") + " " + String(p.description || "")).toLowerCase();
        return hay.indexOf(query.toLowerCase()) !== -1;
      }

      function productMatchesCategory(p, activeCat) {
        if (activeCat === "all") return true;
        return normalizeCategory(p) === activeCat;
      }

      function renderCategoryButtons() {
        var wrap = document.getElementById("catalog-category-buttons");
        var toolbar = document.getElementById("catalog-toolbar");
        var noResults = document.getElementById("catalog-no-results");
        if (!wrap) return;
        if (!window.PRODUCTS.length) {
          if (toolbar) toolbar.style.display = "none";
          if (noResults) noResults.hidden = true;
          return;
        }
        if (toolbar) toolbar.style.display = "";

        var categories = new Set();
        window.PRODUCTS.forEach(function (p) {
          var c = normalizeCategory(p);
          if (c) categories.add(c);
        });
        var sorted = Array.from(categories).sort(function (a, b) {
          return a.localeCompare(b, "ru");
        });
        var labels = [{ key: "all", label: "Все" }].concat(
          sorted.map(function (c) {
            return { key: c, label: c };
          })
        );

        wrap.innerHTML = labels
          .map(function (item) {
            var active = catalogActiveCategory === item.key;
            var cls = active ? "btn primary" : "btn";
            return (
              '<button type="button" class="' +
              cls +
              '" data-category="' +
              escapeAttr(item.key) +
              '">' +
              window.escapeHtml(item.label) +
              "</button>"
            );
          })
          .join("");

        wrap.querySelectorAll("button[data-category]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            catalogActiveCategory = btn.getAttribute("data-category") || "all";
            wrap.querySelectorAll("button[data-category]").forEach(function (b) {
              var on = (b.getAttribute("data-category") || "all") === catalogActiveCategory;
              b.className = on ? "btn primary" : "btn";
            });
            applyCatalogFilters();
          });
        });
      }

      function applyCatalogFilters() {
        var grid = document.getElementById("product-grid");
        var empty = document.getElementById("catalog-no-results");
        var emptyText = document.getElementById("catalog-no-results-text");
        var searchEl = document.getElementById("catalog-search");
        if (!grid || !empty || !emptyText) return;

        if (!window.PRODUCTS.length) {
          empty.hidden = true;
          grid.style.display = "";
          return;
        }

        if (!grid.querySelector(".product-card")) {
          empty.hidden = true;
          grid.style.display = "";
          return;
        }

        var q = (searchEl && searchEl.value.trim()) || "";
        var visible = 0;

        grid.querySelectorAll(".product-card").forEach(function (card) {
          var id = card.dataset.productId;
          var p = window.PRODUCTS.find(function (x) {
            return x.id === id;
          });
          if (!p) return;
          var catOk = productMatchesCategory(p, catalogActiveCategory);
          var searchOk = productMatchesSearch(p, q);
          var show = catOk && searchOk;
          card.style.display = show ? "" : "none";
          if (show) visible++;
        });

        if (visible === 0) {
          empty.hidden = false;
          grid.style.display = "none";
          if (q) {
            emptyText.textContent = "Ничего не найдено по запросу «" + q + "»";
          } else {
            emptyText.textContent = "Ничего не найдено по выбранным условиям";
          }
        } else {
          empty.hidden = true;
          grid.style.display = "";
        }
      }

      function resetCatalogFilters() {
        catalogActiveCategory = "all";
        var searchEl = document.getElementById("catalog-search");
        if (searchEl) searchEl.value = "";
        renderCategoryButtons();
        applyCatalogFilters();
      }

      function emptyCatalogMessage() {
        if (location.protocol === "file:") {
          return (
            "<p class='muted'>Страница открыта как файл с диска — каталог так не загрузится. " +
            "Запустите сервер в папке проекта командой <code>npm run start</code> и откройте в браузере " +
            "<code>http://localhost:3001/catalog</code> (номер порта смотрите в консоли после запуска).</p>"
          );
        }
        var hint = window.__catalogLoadHint;
        if (hint === "empty") {
          return (
            "<p class='muted'>В каталоге пока нет товаров. Добавьте позиции на странице " +
            "<a href='/admin'>редактирования каталога</a> (нужен секретный ключ от администратора).</p>"
          );
        }
        if (hint === "failed") {
          return (
            "<p class='muted'><strong>Не удалось загрузить каталог.</strong> Обычно это значит, что не запущен сервер сайта. " +
            "В папке проекта выполните <code>npm run start</code>, затем обновите эту страницу. " +
            "Адрес в браузере должен быть вида <code>http://localhost:…</code>, а не файл с диска.</p>"
          );
        }
        return (
          "<p class='muted'>Каталог недоступен. Проверьте, что сервер запущен, и обновите страницу.</p>"
        );
      }

      function renderProducts() {
        var root = document.getElementById("product-grid");
        var toolbar = document.getElementById("catalog-toolbar");
        if (!window.PRODUCTS.length) {
          root.innerHTML = emptyCatalogMessage();
          if (toolbar) toolbar.style.display = "none";
          var emptyState = document.getElementById("catalog-no-results");
          if (emptyState) emptyState.hidden = true;
          return;
        }
        root.innerHTML = window.PRODUCTS.map(function (p) {
          var name = window.escapeHtml(p.name);
          var desc = window.escapeHtml(p.description || "");
          var img = window.escapeHtml(p.image || "");
          var id = window.escapeHtml(p.id);
          var unit = window.escapeHtml(p.unit || "");
          var cat = normalizeCategory(p);
          var catAttr = escapeAttr(cat);
          var qtyInCart = window.CartStore.getCartQuantity(p.id);
          var btnLabel = qtyInCart > 0 ? "В корзине (" + qtyInCart + ")" : "В корзину";
          return (
            '<article class="product-card" data-product-id="' +
            id +
            '" data-category="' +
            catAttr +
            '">' +
            '<img src="' +
            img +
            '" alt="' +
            name +
            '" />' +
            '<div class="product-content">' +
            "<strong>" +
            name +
            "</strong>" +
            '<span class="muted">' +
            desc +
            "</span>" +
            '<div class="price-line">' +
            "<span>" +
            window.CartStore.formatRub(p.price) +
            " / " +
            unit +
            "</span>" +
            '<button type="button" class="btn btn--to-cart" data-id="' +
            id +
            '" data-name="' +
            name +
            '">' +
            btnLabel +
            "</button>" +
            "</div>" +
            "</div>" +
            "</article>"
          );
        }).join("");
        renderCategoryButtons();
        applyCatalogFilters();
      }

      function catalogCartButtonLabel(productId) {
        var q = window.CartStore.getCartQuantity(productId);
        return q > 0 ? "В корзине (" + q + ")" : "В корзину";
      }

      function syncCatalogCartButtons() {
        var root = document.getElementById("product-grid");
        if (!root) return;
        root.querySelectorAll("button.btn--to-cart[data-id]").forEach(function (btn) {
          if (btn.classList.contains("btn--added-success")) return;
          btn.textContent = catalogCartButtonLabel(btn.dataset.id);
        });
      }

      var catalogAddToCartWired = false;
      function wireCatalogAddToCart() {
        if (catalogAddToCartWired) return;
        var root = document.getElementById("product-grid");
        if (!root) return;
        catalogAddToCartWired = true;
        root.addEventListener("click", function (e) {
          var btn = e.target.closest("button.btn--to-cart[data-id]");
          if (!btn || !root.contains(btn)) return;
          var id = btn.dataset.id;
          var productName = btn.dataset.name || "Товар";
          if (btn._addRevertTimer) {
            clearTimeout(btn._addRevertTimer);
            btn._addRevertTimer = null;
          }
          btn.classList.remove("btn--added-success");
          window.CartStore.addToCart(id, 1);
          window.CartStore.showToast(productName + " добавлен в корзину");
          btn.classList.add("btn--added-success");
          btn.textContent = "✓ Добавлено";
          btn._addRevertTimer = setTimeout(function () {
            btn.classList.remove("btn--added-success");
            btn.textContent = catalogCartButtonLabel(id);
            btn._addRevertTimer = null;
          }, 1500);
        });
        window.addEventListener("cart:changed", syncCatalogCartButtons);
      }

      document.addEventListener("DOMContentLoaded", function () {
        wireCatalogAddToCart();
        var searchEl = document.getElementById("catalog-search");
        if (searchEl) {
          searchEl.addEventListener("input", applyCatalogFilters);
        }
        var resetBtn = document.getElementById("catalog-reset-filters");
        if (resetBtn) {
          resetBtn.addEventListener("click", resetCatalogFilters);
        }
        if (typeof ensureProductsLoaded === "function") {
          ensureProductsLoaded().then(renderProducts);
        } else {
          renderProducts();
        }
      });
    </script>
  </body>
  </html>
