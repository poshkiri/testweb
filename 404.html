<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Страница не найдена | Наконец-то вкусно</title>
    <meta name="description" content="Запрошенная страница не существует. Вернитесь на главную или в каталог." />
    <script src="assets/js/theme-init.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      .error-code {
        font-family: var(--font-display);
        font-size: clamp(4rem, 14vw, 7.5rem);
        font-weight: 600;
        color: var(--brown);
        line-height: 1;
        margin: 0 0 12px;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div id="header-root"></div>
    <main>
      <div class="container">
        <section class="panel">
          <p class="error-code" aria-hidden="true">404</p>
          <h1 class="section-title">Страница не найдена</h1>
          <p class="muted">Возможно страница была удалена или вы ошиблись в адресе</p>
          <div class="actions">
            <a class="btn primary" href="/">На главную</a>
            <a class="btn" href="/catalog">В каталог</a>
          </div>
        </section>
      </div>
    </main>
    <div id="footer-root"></div>
    <script src="assets/js/products.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/layout.js"></script>
  </body>
</html>
